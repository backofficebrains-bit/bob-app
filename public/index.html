<script>
  const chatEl = document.getElementById('chat');
  const msgEl  = document.getElementById('msg');
  const btnEl  = document.getElementById('send-btn');

  let history = [];
  let loading = false;

  msgEl.addEventListener('input', () => {
    btnEl.disabled = !msgEl.value.trim() || loading;
  });

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!btnEl.disabled) sendMessage();
    }
  }

  function ask(btn) {
    const q = btn.textContent.replace(/^→\s*/, '').trim();
    msgEl.value = q;
    autoResize(msgEl);
    btnEl.disabled = false;
    sendMessage();
  }

  function scrollBottom() {
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function addBubble(role, text) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const row = document.createElement('div');
    row.className = `msg-row ${role}`;

    const av = document.createElement('div');
    av.className = `avatar ${role === 'assistant' ? 'bob' : 'user'}`;
    av.textContent = role === 'assistant' ? '🧠' : '👤';

    const bub = document.createElement('div');
    bub.className = `bubble ${role === 'assistant' ? 'bob' : 'user'}`;
    bub.textContent = text;

    row.appendChild(av);
    row.appendChild(bub);
    chatEl.appendChild(row);

    scrollBottom();
    return bub;
  }

  function addTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row';
    row.id = 'typing-row';

    const av = document.createElement('div');
    av.className = 'avatar bob';
    av.textContent = '🧠';

    const bub = document.createElement('div');
    bub.className = 'bubble bob';
    bub.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';

    row.appendChild(av);
    row.appendChild(bub);
    chatEl.appendChild(row);

    scrollBottom();
  }

  function removeTyping() {
    const t = document.getElementById('typing-row');
    if (t) t.remove();
  }

  async function sendMessage() {

    const text = msgEl.value.trim();
    if (!text || loading) return;

    loading = true;
    btnEl.disabled = true;

    msgEl.value = '';
    msgEl.style.height = 'auto';

    addBubble('user', text);

    history.push({
      role: 'user',
      content: text
    });

    addTyping();

    try {

      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          messages: history
        })
      });

      const data = await res.json();

      removeTyping();

      const reply =
        data.message ||
        data.error ||
        'BOB hit a snag. Try again.';

      addBubble('assistant', reply);

      history.push({
        role: 'assistant',
        content: reply
      });

    } catch (err) {

      removeTyping();

      addBubble(
        'assistant',
        'Network issue. BOB is still here — try again.'
      );

    }

    loading = false;
    msgEl.focus();
  }
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOB — BackOffice Brains</title>

<style>
body{
background:#0b0b11;
color:#e8e8e8;
font-family:monospace;
margin:0;
display:flex;
flex-direction:column;
height:100vh;
}

header{
padding:16px;
border-bottom:1px solid #222;
display:flex;
align-items:center;
gap:10px;
}

header h1{
margin:0;
font-size:18px;
color:#ff6b2b;
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
}

.msg{
margin-bottom:14px;
}

.user{
color:#fff;
}

.bob{
color:#ffb28c;
}

#input{
display:flex;
border-top:1px solid #222;
padding:12px;
gap:10px;
}

textarea{
flex:1;
background:#14141d;
border:1px solid #333;
color:white;
padding:8px;
border-radius:6px;
resize:none;
}

button{
background:#ff6b2b;
border:none;
color:white;
padding:10px 14px;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<header>
🧠 <h1>BOB — BackOffice Brains</h1>
</header>

<div id="chat"></div>

<div id="input">
<textarea id="msg" rows="1" placeholder="Ask BOB about IB Ops..."></textarea>
<button id="send-btn">Send</button>
</div>

<script>
const chatEl = document.getElementById('chat');
const msgEl = document.getElementById('msg');
const btnEl = document.getElementById('send-btn');

let history = [];
let loading = false;

btnEl.onclick = sendMessage;

async function sendMessage(){

const text = msgEl.value.trim();
if(!text || loading) return;

loading=true;
msgEl.value="";

addBubble("user",text);

history.push({
role:"user",
content:text
});

try{

const res = await fetch("/api/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
messages:history
})
});

const data = await res.json();

const reply = data.message || "BOB hit a snag.";

addBubble("bob",reply);

history.push({
role:"assistant",
content:reply
});

}catch(e){

addBubble("bob","Network issue. Try again.");

}

loading=false;
}

function addBubble(role,text){

const div=document.createElement("div");
div.className="msg "+role;
div.textContent=(role==="user"?"You: ":"BOB: ")+text;

chatEl.appendChild(div);
chatEl.scrollTop=chatEl.scrollHeight;

}
</script>

</body>
</html>
